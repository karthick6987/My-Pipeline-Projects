on:
  workflow_call:
    inputs:
      environment: { 
        required: true, 
        type: string 
        }
      docker_image: { 
        required: true, 
        type: string 
        }
        
    secrets:
      AZURE_CLIENT_ID:
       required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      # 1. AUTHENTICATION: This was missing in the reusable part
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      # 2. CONNECTIVITY: Environment variables for Terraform AzureRM provider
      - name: Terraform Init & Apply
        shell: bash
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=terraform-state-rg" \
            -backend-config="storage_account_name=tfstategithubaction2026" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.environment }}.tfstate"
          
          terraform apply \
            -var="env=${{ inputs.environment }}" \
            -var="docker_image=${{ inputs.docker_image }}" \
            -auto-approve