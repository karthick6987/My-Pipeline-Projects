name: AKS-Main-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  # 1. Build Job: Generates the image tag and passes it as an output
  build:
    runs-on: ubuntu-latest
    outputs:
      # Map the step output to a job-level output
      image_tag: ${{ steps.prep.outputs.full_image_name }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push
        id: prep # Give this step an ID to reference its outputs
        run: |
          # Define the image name
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/webapp:${{ github.sha }}"
          
          # Build and Push
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          
          # Set the output for use in other jobs
          echo "full_image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

  # 2. Call the Reusable Workflow for Staging
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      environment: staging
      # Access the output from the 'build' job
      docker_image: ${{ needs.build.outputs.image_tag }}
    secrets: inherit 

  # 3. Call the Reusable Workflow for Production
  deploy-production:
    needs: [build, deploy-staging] # Ensure it waits for build AND staging
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      environment: production
      docker_image: ${{ needs.build.outputs.image_tag }}
    secrets: inherit