name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: infra

      - name: Security Scan (checkov)
        uses: bridgecrewio/checkov-action@master

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=${{ inputs.environment }}.tfvars
        working-directory: infra

  build-and-deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/app:${{ github.sha }} .

      - name: Push to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/app:${{ github.sha }}

      - name: AKS Deploy
        run: |
          az aks get-credentials --resource-group rg --name aks
          kubectl set image deployment/app app=${{ secrets.ACR_NAME }}.azurecr.io/app:${{ github.sha }}